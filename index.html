<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Angel - Aurel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background: linear-gradient(135deg,#ffb6d9,#ffd6ea,#fff0f6);
      overflow-x:hidden;
      color:white;
      text-align:center;
    }

    .container{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .glass{
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      backdrop-filter:blur(12px);
      border-radius:30px;
      padding:30px;
      width:90%;
      max-width:430px;
      box-shadow:0 8px 30px rgba(0,0,0,0.2);
      animation:fadeIn 1.5s ease;
    }

    h1{
      font-size:38px;
      margin-bottom:10px;
      color:white;
      text-shadow:0 0 10px rgba(255,255,255,0.7);
    }

    p{
      font-size:16px;
      line-height:1.7;
      margin-top:15px;
      color:white;
    }

    button{
      margin-top:25px;
      padding:14px 35px;
      border:none;
      border-radius:50px;
      background:white;
      color:#ff4f93;
      font-size:17px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
      box-shadow:0 5px 20px rgba(255,255,255,0.5);
    }

    button:hover{
      transform:scale(1.05);
      background:#ffe4f0;
    }

    .hidden{
      display:none;
    }

    .gallery{
      margin-top:20px;
      display:grid;
      gap:15px;
    }

    .gallery img{
      width:100%;
      border-radius:20px;
      object-fit:cover;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
      animation:float 3s ease-in-out infinite;
    }

    .date{
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
      color:white;
    }

    .love{
      position:fixed;
      top:-10px;
      color:pink;
      animation:fall linear infinite;
      z-index:999;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-8px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    @keyframes fall{
      to{
        transform:translateY(100vh);
      }
    }
  </style>
</head>

<body>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
  <div class="glass">

    <h1>Hi Ndut 💖</h1>

    <p>
      ada sesuatu buat kamu ✨
    </p>

    <button onclick="openHeart()">
      Open My Heart 💌
    </button>

    <div id="content" class="hidden">

      <div class="gallery">
        <img src="foto1.jpg" alt="">
        <img src="foto2.jpg" alt="">
        <img src="foto3.jpg" alt="">
      </div>

      <div class="date">
        Since 28 Agustus 💞
      </div>

      <p>
        Makasih ya sayang udah hadir di hidup aku 💖
        <br><br>

        Kamu itu rumah paling nyaman yang pernah aku temuin.
        Semoga kita selalu sama-sama terus yaa ✨
        <br><br>

        Aku bakal selalu sayang sama kamu,
        dalam keadaan apapun 🤍
      </p>

    </div>

  </div>
</div>

<script>
  function openHeart() {

    document.getElementById("content")
      .classList.remove("hidden");

    const music =
      document.getElementById("bgmusic");

    music.play();
  }

  function createLove(){

    const love =
      document.createElement("div");

    love.classList.add("love");

    love.innerHTML = "💖";

    love.style.left =
      Math.random() * 100 + "vw";

    love.style.animationDuration =
      Math.random() * 3 + 2 + "s";

    love.style.fontSize =
      Math.random() * 20 + 15 + "px";

    document.body.appendChild(love);

    setTimeout(()=>{
      love.remove();
    },5000);
  }

  setInterval(createLove,300);
</script>

</body>
</html>
