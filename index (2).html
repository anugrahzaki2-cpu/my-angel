<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Angel - Aurel 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
background:linear-gradient(135deg,#ff9ecf,#ffd4e8,#fff0f7);
overflow-x:hidden;min-height:100vh;
display:flex;justify-content:center;align-items:center;padding:20px
}
.hidden{display:none!important}

#loading{
position:fixed;inset:0;z-index:99999;
display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#ff7eb3,#ffb6d9);
color:white;font-size:2rem;font-weight:700
}

.login-box,.main-box{
background:rgba(255,255,255,.28);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.5);
border-radius:35px;
padding:30px;
width:100%;max-width:550px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,.15);
animation:fadeIn 1s ease;
position:relative;
}

h1{color:#c2185b;font-size:2.5rem}
h2{color:#c2185b;margin-top:25px}
p{color:#4a2033;line-height:1.8;margin-top:15px}

input{
width:100%;padding:15px;border:none;border-radius:20px;
margin-top:20px;text-align:center;font-size:16px
}

button{
margin-top:15px;
padding:14px 30px;
border:none;border-radius:50px;
background:#ff4f93;color:white;font-weight:700;
cursor:pointer;transition:.3s;
box-shadow:0 5px 15px rgba(255,79,147,.4)
}
button:hover{transform:scale(1.05)}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;margin-top:25px
}
.photo-card{overflow:hidden;border-radius:20px}
.photo-card img{
width:100%;height:220px;object-fit:cover;
transition:.4s;cursor:pointer
}
.photo-card img:hover{transform:scale(1.08)}
.big{grid-column:span 2}
.big img{height:300px}

.date,#countdown{
margin-top:15px;
color:#c2185b;
font-weight:700
}

.message{
white-space:pre-line;
font-weight:600;
font-size:17px
}

#noBtn{position:absolute}

.love{
position:fixed;
top:-20px;
pointer-events:none;
z-index:9999;
animation:fall linear forwards;
}

#popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}
#popup img{
width:90%;
max-width:800px;
border-radius:20px;
}

.music-btn{
position:fixed;
bottom:20px;
right:20px;
z-index:1000;
}

.footer{
margin-top:25px;
font-size:14px;
color:#8a4a67;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
@keyframes fall{
to{transform:translateY(110vh)}
}
</style>
</head>
<body>

<div id="loading">Loading Love... 💖</div>

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn hidden" id="musicBtn">🎵 Music</button>

<div class="login-box" id="loginBox">
<h1>Hi Aurel 💖</h1>
<p>Masukkan password tanggal jadian dulu yaa ✨</p>
<input type="password" id="password" placeholder="Password">
<button onclick="checkPassword()">Masuk 💌</button>
</div>

<div class="main-box hidden" id="mainBox">
<h1>Hi Ndut 💖</h1>
<p>Ada sesuatu buat kamu ✨</p>
<button onclick="openHeart()">Open My Heart 💌</button>

<div id="content" class="hidden">

<div class="gallery">
<div class="photo-card big"><img src="foto1.jpg"></div>
<div class="photo-card"><img src="foto2.jpg"></div>
<div class="photo-card"><img src="foto3.jpg"></div>
<div class="photo-card"><img src="foto4.jpg"></div>
<div class="photo-card"><img src="foto5.jpg"></div>
</div>

<div class="date">Since 28 Agustus 2025 💞</div>
<div id="countdown"></div>

<p class="message" id="typing"></p>

<h2>Do you love ndut? 💌</h2>

<button onclick="yesLove()">YES 💖</button>
<button id="noBtn" onmouseover="moveButton()">NO 😭</button>

<div class="footer">Made with Love by Zakki 💖</div>

</div>
</div>

<div id="popup" class="hidden">
<img id="popupImg">
</div>

<script>
window.onload=()=>{
setTimeout(()=>{
document.getElementById("loading").style.display="none";
},2200);
};

function checkPassword(){
const pass=document.getElementById("password").value;
if(pass==="28082025"){
loginBox.classList.add("hidden");
mainBox.classList.remove("hidden");
}else{
alert("Password salah sayang 😭");
}
}

let typed=false;

function openHeart(){
content.classList.remove("hidden");

const music=document.getElementById("bgmusic");
music.play().catch(()=>{});
musicBtn.classList.remove("hidden");

if(!typed){
typeWriter();
typed=true;
}
}

musicBtn.onclick=()=>{
const music=document.getElementById("bgmusic");
if(music.paused){
music.play();
}else{
music.pause();
}
};

const text=`Makasih ya sayang udah hadir di hidup aku 💖

Kamu itu rumah paling nyaman yang pernah aku temuin 💗

Semoga kita selalu sama-sama terus yaa ✨

Aku bakal selalu sayang sama kamu, dalam keadaan apapun 🤍`;

let i=0;
function typeWriter(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}

function updateCountdown(){
const start=new Date("2025-08-28");
const now=new Date();
const diff=Math.abs(now-start);
const days=Math.floor(diff/(1000*60*60*24));
document.getElementById("countdown").innerHTML="💞 "+days+" hari bersama 💞";
}
setInterval(updateCountdown,1000);
updateCountdown();

function yesLove(){
document.body.innerHTML=`
<div style="height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#ff9ecf,#ffd4e8,#fff0f7);padding:20px">
<div>
<h1 style="color:#c2185b;font-size:60px">I LOVE YOU 💖</h1>
<p style="font-size:24px;margin-top:20px;color:#4a2033">
Aku bakal tetap pilih kamu,<br>
hari ini, besok, dan seterusnya ✨
</p>
<h2 style="margin-top:25px;color:#ff2f7d">Forever With Aurel 💞</h2>
</div>
</div>`;
}

function moveButton(){
const btn=document.getElementById("noBtn");
btn.style.left=Math.random()*70+"%";
btn.style.top=Math.random()*70+"%";
}

function createLove(){
const love=document.createElement("div");
love.classList.add("love");

const hearts=["💖","💕","💗","💘","💞","❤️"];
love.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

love.style.left=Math.random()*100+"vw";
love.style.fontSize=(Math.random()*25+15)+"px";
love.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(love);

setTimeout(()=>love.remove(),7000);
}
setInterval(createLove,300);

document.addEventListener("click",e=>{
if(e.target.tagName==="IMG" && e.target.parentElement.classList.contains("photo-card")){
popup.classList.remove("hidden");
popupImg.src=e.target.src;
}
});

popup.onclick=()=>popup.classList.add("hidden");
</script>
</body>
</html>
